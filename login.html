<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuildCore | Portal Authentication</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #1E293B;
            --accent-color: #F59E0B;
            --bg-color: #F8FAFC;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            background: #ffffff;
            overflow: hidden;
            max-width: 500px;
            width: 100%;
        }
        .auth-header {
            background-color: var(--primary-color);
            color: white;
            padding: 2.5rem 2rem;
            text-align: center;
        }
        .form-control, .form-select {
            padding: 0.75rem 1rem;
            border-color: #E2E8F0;
            border-radius: 8px;
        }
        .form-control:focus, .form-select:focus {
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.15);
            border-color: var(--accent-color);
        }
        .btn-primary-custom {
            background-color: var(--primary-color);
            color: white;
            padding: 0.75rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            transition: opacity 0.2s;
        }
        .btn-primary-custom:hover {
            opacity: 0.95;
            color: white;
        }
    </style>
</head>
<body>

    <div class="container p-3">
        <div class="auth-card mx-auto">
            <div class="auth-header text-center">
                <a class="text-white d-flex align-items-center justify-content-center text-decoration-none mb-2 h3 fw-bold" href="index.html">
                    <i class="fa-solid fa-helmet-safety me-2" style="color: var(--accent-color)"></i>
                    BUILD<span style="color: var(--accent-color)">CORE</span>
                </a>
                <p class="text-white-50 m-0 small">Enterprise Infrastructure Management System</p>
            </div>
            <div class="p-4 p-sm-5">
                <h2 class="h4 fw-bold mb-4">Secure Sign In</h2>
                <form id="authForm" novalidate>
                    <div class="mb-3">
                        <label class="form-label fw-medium text-secondary">Work Email Address</label>
                        <input type="email" id="email" class="form-control" placeholder="name@company.com" required>
                        <div class="invalid-feedback">Please enter a valid work email.</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-medium text-secondary">Password</label>
                        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                        <div class="invalid-feedback">Please provide your password.</div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-medium text-secondary">Portal Routing Role</label>
                        <select id="roleSelector" class="form-select" required>
                            <option value="" disabled selected>Choose assigned functional view...</option>
                            <option value="admin.html">Platform Administrator</option>
                            <option value="qs.html">Quantity Surveyor / QA Scheduler</option>
                            <option value="site-manager.html">Field Site Manager</option>
                            <option value="client.html">Client Project Portal</option>
                        </select>
                        <div class="invalid-feedback">Please choose a workflow target view.</div>
                    </div>
                    <button type="submit" class="btn btn-primary-custom w-100 d-flex align-items-center justify-content-center gap-2">
                        Authenticate Account <i class="fa-solid fa-arrow-right-to-bracket"></i>
                    </button>
                </form>
                <div class="mt-4 text-center">
                    <a href="index.html" class="text-decoration-none text-muted small"><i class="fa-solid fa-arrow-left me-1"></i> Back to Homepage</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        $(document).ready(function() {
            $('#authForm').on('submit', function(e) {
                e.preventDefault();
                
                var form = this;
                var email = $('#email').val().trim();
                var password = $('#password').val().trim();
                var routeTarget = $('#roleSelector').val();

                if (email === "" || password === "" || !routeTarget) {
                    $(form).addClass('was-validated');
                    return false;
                }

                // Smoothly simulate enterprise credential parsing and redirect to separate dashboard pages
                window.location.href = routeTarget;
            });
        });
    </script>
</body>
</html>
