<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuildCore | Access Workspace</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #1E293B;
            --accent-color: #F59E0B;
            --bg-color: #F8FAFC;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top left, #F1F5F9, #E2E8F0);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }
        @keyframes cardPop {
            from { opacity: 0; transform: scale(0.95) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .auth-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 20px 40px -15px rgba(15, 23, 42, 0.1);
            background: #ffffff;
            width: 100%;
            max-width: 460px;
            animation: cardPop 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .auth-header {
            background-color: var(--primary-color);
            color: white;
            padding: 2.5rem 2rem;
            border-radius: 20px 20px 0 0;
            position: relative;
        }
        .form-control, .form-select {
            padding: 0.75rem 1rem;
            border: 1px solid #CBD5E1;
            border-radius: 10px;
            background-color: #F8FAFC;
            transition: all 0.2s ease;
        }
        .form-control:focus, .form-select:focus {
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.15);
            border-color: var(--accent-color);
        }
        .password-toggle {
            cursor: pointer;
            background: #F8FAFC;
            border: 1px solid #CBD5E1;
            border-left: none;
            border-radius: 0 10px 10px 0;
            color: #64748B;
            transition: color 0.2s;
        }
        .password-toggle:hover {
            color: var(--primary-color);
        }
        .btn-submit {
            background-color: var(--primary-color);
            color: white;
            padding: 0.8rem;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            transition: all 0.2s ease;
        }
        .btn-submit:hover {
            opacity: 0.95;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(30, 41, 59, 0.2);
        }
    </style>
</head>
<body>

    <div class="container p-3">
        <div class="auth-card mx-auto">
            <div class="auth-header text-center">
                <a class="text-white d-flex align-items-center justify-content-center text-decoration-none h3 fw-bold m-0" href="index.html">
                    <i class="fa-solid fa-helmet-safety me-2" style="color: var(--accent-color)"></i>
                    BUILD<span style="color: var(--accent-color)">CORE</span>
                </a>
                <p class="text-white-50 m-0 small mt-2">Sign in to control your job sites</p>
            </div>

            <div class="p-4 p-sm-5">
                <form id="loginForm" novalidate>
                    <div class="mb-3">
                        <label class="form-label fw-semibold text-secondary small">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light text-muted border-end-0"><i class="fa-regular fa-envelope"></i></span>
                            <input type="email" id="loginEmail" class="form-control border-start-0" placeholder="name@company.com" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <div class="d-flex justify-content-between align-items-center mb-1">
                            <label class="form-label fw-semibold text-secondary small m-0">Password</label>
                            <a href="#" class="text-decoration-none small text-warning fw-medium" onclick="alert('Password reset link sent to your email container simulation.')">Forgot Password?</a>
                        </div>
                        <div class="input-group">
                            <span class="input-group-text bg-light text-muted border-end-0"><i class="fa-solid fa-lock"></i></span>
                            <input type="password" id="loginPassword" class="form-control border-start-0 border-end-0" placeholder="••••••••" required>
                            <span class="input-group-text password-toggle" id="togglePasswordBtn">
                                <i class="fa-regular fa-eye" id="toggleIcon"></i>
                            </span>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold text-secondary small">Simulation Environment Target</label>
                        <select id="roleSelector" class="form-select" required>
                            <option value="" disabled selected>Route into dashboard view...</option>
                            <option value="admin.html">Platform Administrator Dashboard</option>
                            <option value="qs.html">QS / Task Scheduler Dashboard</option>
                            <option value="site-manager.html">Field Site Manager Dashboard</option>
                            <option value="client.html">Client Progress Dashboard</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-submit w-100 d-flex align-items-center justify-content-center gap-2 mb-4">
                        Secure Authentication <i class="fa-solid fa-arrow-right-to-bracket"></i>
                    </button>
                </form>

                <div class="text-center border-top pt-4">
                    <p class="text-muted small mb-2">Not registered yet?</p>
                    <a href="signup.html" class="btn btn-outline-secondary btn-sm w-100 py-2 fw-semibold">Create an Account</a>
                </div>

                <div class="mt-4 text-center">
                    <a href="index.html" class="text-decoration-none text-muted small"><i class="fa-solid fa-arrow-left me-1"></i> Back to Homepage</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        $(document).ready(function() {
            // Password Show/Hide Toggle Logic
            $('#togglePasswordBtn').on('click', function() {
                const passInput = $('#loginPassword');
                const icon = $('#toggleIcon');
                
                if (passInput.attr('type') === 'password') {
                    passInput.attr('type', 'text');
                    icon.removeClass('fa-eye').addClass('fa-eye-slash');
                } else {
                    passInput.attr('type', 'password');
                    icon.removeClass('fa-eye-slash').addClass('fa-eye');
                }
            });

            // Submission Handling Verification
            $('#loginForm').on('submit', function(e) {
                e.preventDefault();
                const routeTarget = $('#roleSelector').val();
                
                if (!this.checkValidity() || !routeTarget) {
                    $(this).addClass('was-validated');
                    return false;
                }
                window.location.href = routeTarget;
            });
        });
    </script>
</body>
</html>
